name: Branch Artifacts

on:
  push:
    branches: [feature/dolt-helper-backend]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GO_VERSION: '1.26.2'
  LLVM_MINGW_VERSION: '20260421'

jobs:
  package:
    name: Package ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest,   rid: win-x64,     archive: zip,    dotnet_ext: .exe, helper_ext: .exe, goos: windows, goarch: amd64, cc: x86_64-w64-mingw32-gcc }
          - { os: windows-latest,   rid: win-arm64,   archive: zip,    dotnet_ext: .exe, helper_ext: .exe, goos: windows, goarch: arm64, cc: aarch64-w64-mingw32-gcc }
          - { os: ubuntu-latest,    rid: linux-x64,   archive: tar.gz, dotnet_ext: '',   helper_ext: '',   goos: linux,   goarch: amd64, cc: gcc }
          - { os: ubuntu-24.04-arm, rid: linux-arm64, archive: tar.gz, dotnet_ext: '',   helper_ext: '',   goos: linux,   goarch: arm64, cc: gcc }
          - { os: macos-13,         rid: osx-x64,     archive: tar.gz, dotnet_ext: '',   helper_ext: '',   goos: darwin,  goarch: amd64, cc: clang }
          - { os: macos-14,         rid: osx-arm64,   archive: tar.gz, dotnet_ext: '',   helper_ext: '',   goos: darwin,  goarch: arm64, cc: clang }

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: tools/sarif-dolt/go.sum

      - name: Install Linux CGO toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install LLVM-MinGW for Windows CGO
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = '${{ env.LLVM_MINGW_VERSION }}'
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$version/llvm-mingw-$version-ucrt-x86_64.zip"
          $archive = Join-Path $env:RUNNER_TEMP 'llvm-mingw.zip'
          $destination = Join-Path $env:RUNNER_TEMP 'llvm-mingw'
          Invoke-WebRequest -Uri $url -OutFile $archive
          Expand-Archive -Path $archive -DestinationPath $destination
          $bin = Get-ChildItem -Path $destination -Directory | Select-Object -First 1 | ForEach-Object { Join-Path $_.FullName 'bin' }
          Add-Content -Path $env:GITHUB_PATH -Value $bin

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Publish sarif-cli (${{ matrix.rid }})
        shell: bash
        run: |
          dotnet publish src/Sarif.Cli -c Release -r ${{ matrix.rid }} \
            -p:Version=0.0.0-${GITHUB_SHA::7} \
            -o publish/${{ matrix.rid }}

      - name: Build sarif-dolt (${{ matrix.rid }})
        shell: bash
        run: |
          set -euo pipefail
          cd tools/sarif-dolt
          CGO_ENABLED=1 \
          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          CC=${{ matrix.cc }} \
          go build -tags=gms_pure_go -o ../../publish/${{ matrix.rid }}/sarif-dolt${{ matrix.helper_ext }} .

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          REF_SAFE="$(echo "${GITHUB_REF_NAME}" | tr '/\\' '--')"
          SHORT_SHA="${GITHUB_SHA::7}"
          NAME="sarif-cli-dolt-${REF_SAFE}-${SHORT_SHA}-${{ matrix.rid }}"
          STAGE="stage/${NAME}"
          mkdir -p "${STAGE}" dist
          cp "publish/${{ matrix.rid }}/sarif-cli${{ matrix.dotnet_ext }}" "${STAGE}/"
          cp "publish/${{ matrix.rid }}/sarif-dolt${{ matrix.helper_ext }}" "${STAGE}/"
          cp LICENSE README.md "${STAGE}/"
          cp tools/sarif-dolt/README.md "${STAGE}/SARIF_DOLT.md"
          cd stage
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a -tzip "../dist/${NAME}.zip" "${NAME}" >/dev/null
          else
            tar -czf "../dist/${NAME}.tar.gz" "${NAME}"
          fi
          cd ..
          if command -v sha256sum >/dev/null 2>&1; then
            ( cd dist && sha256sum "${NAME}.${{ matrix.archive }}" > "${NAME}.${{ matrix.archive }}.sha256" )
          else
            ( cd dist && shasum -a 256 "${NAME}.${{ matrix.archive }}" > "${NAME}.${{ matrix.archive }}.sha256" )
          fi

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: sarif-cli-dolt-${{ matrix.rid }}
          path: dist/*
          retention-days: 14
